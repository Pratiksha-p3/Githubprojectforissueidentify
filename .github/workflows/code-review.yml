name: AI Code Review

# Runs the review agent (app.py) against every PR. This is the "CI/CD
# pipeline hooks" piece of the automation workflow — the same review that
# runs via the /webhook/github endpoint also runs here.
#
# This job intentionally succeeds even when the review finds critical
# issues — "Run AI code review" completing successfully means the review
# ran, not that the code is clean. The actual merge block is the separate
# "ai-code-review/security" commit status app.py sets on the PR (see
# agents/pr_gate.py), so critical findings don't need to fail this job to
# stop the merge. Making this job "fail" for expected findings would also
# make GitHub's own "only notify on failed workflows" email setting fire
# on every run with an unresolved finding, not just on real errors.
#
# For the block to actually be enforced (not just shown as a check),
# add "ai-code-review/security" as a required status check at
# Settings > Branches > Branch protection rules.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

# Applying several suggestions one at a time (or pushing a few commits in
# quick succession) fires one workflow run per commit. Without this, every
# one of those runs completes and posts/notifies independently. With it,
# starting a new run for this PR cancels whatever run for this same PR is
# still in progress — only the run for the latest commit actually finishes
# and posts, so a burst of pushes ends in one notification, not one per push.
concurrency:
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install semgrep

      # Only written when a GitHub App is actually set up (optional — see
      # the "Run AI code review" step below). Most setups don't need this:
      # GITHUB_TOKEN, which Actions injects into every run automatically,
      # is enough to load the PR and post review comments.
      - name: Write GitHub App private key
        if: env.GITHUB_APP_PRIVATE_KEY != ''
        env:
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
        run: echo "$GITHUB_APP_PRIVATE_KEY" > github_app.pem

      - name: Run AI code review
        env:
          # Required: the one secret you actually need to add, at
          # Settings > Secrets and variables > Actions > New repository secret.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

          # GITHUB_TOKEN needs no setup — Actions provides it automatically,
          # scoped to this repo, with the permissions declared above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Optional — only used if you've set these up.
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY_PATH: github_app.pem
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          python -m cli review \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --output reports

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: reports/
          retention-days: 14

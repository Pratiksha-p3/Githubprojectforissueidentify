name: AI Code Review

# Manual only — does NOT run automatically on every commit/push. Trigger it
# from the Actions tab ("Run workflow", enter the PR number), or just run
# `python app.py --repo owner/repo --pr N` locally, which is equivalent and
# doesn't need this workflow at all. Every commit auto-triggering this used
# to mean a notification per commit (comments, workflow-run emails) even
# while just iterating on a PR — this makes reviewing/notifying an explicit
# action instead of a side effect of pushing.
#
# Trade-off: the "ai-code-review/security" merge-gate status (see
# agents/pr_gate.py) also only updates when this runs, so it won't
# auto-refresh on every commit anymore — only when you trigger a review.
#
# This job intentionally succeeds even when the review finds critical
# issues — "Run AI code review" completing successfully means the review
# ran, not that the code is clean. The actual merge block is the separate
# "ai-code-review/security" commit status, so critical findings don't need
# to fail this job to stop the merge. For the block to actually be
# enforced (not just shown as a check), add "ai-code-review/security" as
# a required status check at Settings > Branches > Branch protection rules.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

# If you happen to trigger two runs for the same PR close together, only
# the newer one finishes — the earlier one is cancelled before it can post.
concurrency:
  group: ai-code-review-${{ github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install semgrep

      # Only written when a GitHub App is actually set up (optional — see
      # the "Run AI code review" step below). Most setups don't need this:
      # GITHUB_TOKEN, which Actions injects into every run automatically,
      # is enough to load the PR and post review comments.
      - name: Write GitHub App private key
        if: env.GITHUB_APP_PRIVATE_KEY != ''
        env:
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
        run: echo "$GITHUB_APP_PRIVATE_KEY" > github_app.pem

      - name: Run AI code review
        env:
          # Required: the one secret you actually need to add, at
          # Settings > Secrets and variables > Actions > New repository secret.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

          # GITHUB_TOKEN needs no setup — Actions provides it automatically,
          # scoped to this repo, with the permissions declared above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Optional — only used if you've set these up.
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY_PATH: github_app.pem
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          python -m cli review \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.inputs.pr_number }}" \
            --output reports

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: reports/
          retention-days: 14
